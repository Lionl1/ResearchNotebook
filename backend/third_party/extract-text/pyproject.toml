[project]
name = "extract-text"
version = "1.10.5"
description = "API для извлечения текста из файлов различных форматов"
authors = [
    {name = "Барилко Виталий", email = "support@softonit.ru"}
]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi==0.116.1",
    "uvicorn[standard]==0.35.0",
    "python-multipart==0.0.20",
    "PyPDF2==3.0.1",
    "pdfplumber==0.11.7",
    "python-docx==1.2.0",
    "python-pptx==1.0.2",
    "striprtf==0.0.29",
    "pandas==2.3.1",
    "openpyxl==3.1.5",
    "xlrd==2.0.2",
    "Pillow==11.3.0",
    "pytesseract==0.3.13",
    "beautifulsoup4==4.13.4",
    "lxml==6.0.0",
    "markdown==3.8.2",
    "requests==2.32.4",
    "playwright==1.54.0",
    "PyYAML==6.0.2",
    "odfpy==1.4.1",
    "rarfile==4.2",
    "py7zr==1.0.0",
    "python-dotenv==1.1.1",
    "python-magic==0.4.27",
    "extract-msg==0.54.1",
    "structlog==25.4.0",
]

[dependency-groups]
dev = [
    "pytest==8.4.1",
    "pytest-asyncio==1.1.0",
    "pytest-cov==6.2.1",
    "httpx==0.28.1",
    "pytest-mock==3.14.1",
]